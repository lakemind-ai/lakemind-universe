server {
    listen 80;
    gzip on;
    gzip_types text/plain text/css application/javascript;

    client_max_body_size 10M;

    location / {
        add_header 'Access-Control-Allow-Origin' '*';
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}
