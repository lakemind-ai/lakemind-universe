name: lakemind-api-service

auth:
  unauthenticated_paths:
    - /api/*

command:
  - "uvicorn"
  - "app.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

resources:
  - name: lakemind-db
    type: database
    database: lakemind
    permission: CAN_CONNECT_AND_CREATE

env:
  - name: SERVICE_NAME
    value: LakeMindApiService
  - name: DATABRICKS_DATABASE_INSTANCE
    value: lakemind-db
  - name: DATABRICKS_DATABASE_NAME
    value: lakemind
  - name: DATABRICKS_DATABASE_PORT
    value: "5432"
  - name: DB_POOL_SIZE
    value: "10"
  - name: DB_MAX_OVERFLOW
    value: "20"
  - name: DB_POOL_TIMEOUT
    value: "60"
  - name: DB_POOL_RECYCLE
    value: "1200"
  - name: DATABRICKS_OIDC_CLIENT_ID
    valueFrom: DATABRICKS_OIDC_CLIENT_ID
  - name: DATABRICKS_OIDC_CLIENT_SECRET
    valueFrom: DATABRICKS_OIDC_CLIENT_SECRET
